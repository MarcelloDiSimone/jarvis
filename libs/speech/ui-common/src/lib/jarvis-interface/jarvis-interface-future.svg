<svg
  id="jarvis-interface-future"
  role="img"
  aria-label="Futuristic Jarvis voice interface"
  shape-rendering="geometricPrecision"
  text-rendering="geometricPrecision"
  viewBox="0 0 360 360"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <filter id="blur-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur result="result" stdDeviation=".45" />
    </filter>
    <filter id="green-glow" x="-35%" y="-35%" width="170%" height="170%">
      <feFlood result="flood" flood-color="#eeff9f" flood-opacity=".55" />
      <feComposite in="flood" result="mask" in2="SourceGraphic" operator="in" />
      <feMorphology in="mask" result="dilated" operator="dilate" radius="1.2" />
      <feGaussianBlur in="dilated" result="blurred" stdDeviation="7" />
      <feMerge>
        <feMergeNode in="blurred" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-cyan-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feFlood result="flood" flood-color="#55fff0" flood-opacity=".28" />
      <feComposite in="flood" result="mask" in2="SourceGraphic" operator="in" />
      <feGaussianBlur in="mask" result="blurred" stdDeviation="5" />
      <feMerge>
        <feMergeNode in="blurred" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="inset-shadow">
      <feOffset dx="2" dy="2" />
      <feGaussianBlur stdDeviation="1" result="offset-blur" />
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse" />
      <feFlood flood-color="#7daf00" flood-opacity=".95" result="color" />
      <feComposite operator="in" in="color" in2="inverse" result="shadow" />
      <feComposite operator="over" in="shadow" in2="SourceGraphic" />
    </filter>
    <radialGradient id="bevel-fill" cx="42%" cy="36%" r="64%">
      <stop offset="0" stop-color="#dfff8f" stop-opacity=".18" />
      <stop offset=".44" stop-color="#57ffbf" stop-opacity=".06" />
      <stop offset=".72" stop-color="#071307" stop-opacity=".1" />
      <stop offset="1" stop-color="#000000" stop-opacity=".34" />
    </radialGradient>
    <linearGradient id="bevel-highlight" x1="132" x2="228" y1="122" y2="238" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f5ffd2" stop-opacity=".82" />
      <stop offset=".46" stop-color="#8fcf18" stop-opacity=".18" />
      <stop offset="1" stop-color="#102600" stop-opacity=".62" />
    </linearGradient>
    <linearGradient id="bevel-shadow" x1="126" x2="234" y1="126" y2="234" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#041000" stop-opacity=".72" />
      <stop offset=".52" stop-color="#55fff0" stop-opacity=".1" />
      <stop offset="1" stop-color="#f0ffb0" stop-opacity=".46" />
    </linearGradient>
    <g id="outer-rosette-unit">
      <path d="M180 10v24" />
      <path d="M171 42h18l7 7h21" />
      <path d="M164 52h17l5 5h27" />
      <path d="M170 63h14l5 5h18" />
      <circle cx="217" cy="49" r="2.1" />
      <circle cx="213" cy="57" r="1.7" />
      <path d="M158 24l8 8h28l8-8" />
    </g>
    <g id="middle-rosette-unit">
      <path d="M180 43v18" />
      <path d="M165 72h20l5-5h22" />
      <path d="M168 84h17l7 7h18" />
      <circle cx="212" cy="67" r="1.8" />
      <circle cx="210" cy="91" r="1.5" />
    </g>
    <g id="inner-rosette-unit">
      <path d="M180 75v17" />
      <path d="M166 101h15l6-6h15" />
      <path d="M164 113h19l5 5h14" />
      <circle cx="202" cy="95" r="1.5" />
      <circle cx="202" cy="118" r="1.3" />
    </g>
    <style>
      #jarvis-interface-future {
        --color-stroke: #8fcf18;
        --color-accent: #55fff0;
        --color-hot: #ff4bd8;
        --loudness: 0;
        --pulse-scale: calc(1 + (var(--loudness) * .13));
        background: transparent;
        overflow: visible;
      }

      #jarvis-interface-future line,
      #jarvis-interface-future path,
      #jarvis-interface-future rect,
      #jarvis-interface-future circle,
      #jarvis-interface-future polyline,
      #jarvis-interface-future polygon {
        fill: none;
        stroke: var(--color-stroke);
        vector-effect: non-scaling-stroke;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      #circle-group {
        transform-origin: 180px 180px;
        transform: scale(var(--pulse-scale));
        filter: url(#blur-filter) url(#inset-shadow) drop-shadow(3px 5px 2px rgb(0 0 0 / .7));
      }

      #outer-circle,
      #inner-circle,
      #signal-crown {
        animation: rotate-cw 60s linear infinite;
        transform-origin: 180px 180px;
      }

      #inner-circle {
        animation-duration: 28s;
      }

      #center-circle,
      #rotating-circles {
        animation: rotate-ccw 42s linear infinite;
        transform-origin: 180px 180px;
      }

      #rotating-circles {
        animation-duration: 24s;
      }

      #bouncing-circles {
        animation: breathe 620ms ease-in-out infinite alternate;
        transform-origin: 180px 180px;
      }

      #main-circle {
        filter: url(#soft-cyan-glow);
      }

      #main-circle path {
        stroke-width: 1.25;
      }

      #caption path {
        stroke-width: .8;
      }

      .accent {
        stroke: var(--color-accent);
        opacity: .58;
      }

      .hot {
        stroke: var(--color-hot);
        opacity: .38;
      }

      #jarvis-interface-future .bevel-fill {
        fill: url(#bevel-fill);
        stroke: none;
      }

      #jarvis-interface-future .bevel-highlight {
        stroke: url(#bevel-highlight);
      }

      #jarvis-interface-future .bevel-shadow {
        stroke: url(#bevel-shadow);
      }

      .thin {
        stroke-width: .7;
      }

      .medium {
        stroke-width: 1.35;
      }

      .heavy {
        stroke-width: 2;
      }

      .ghost {
        opacity: .22;
      }

      .soft {
        opacity: .48;
      }

      @media (prefers-reduced-motion: reduce) {
        #jarvis-interface-future * {
          animation-duration: 1ms !important;
          animation-iteration-count: 1 !important;
        }
      }

      @keyframes rotate-cw {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes rotate-ccw {
        to {
          transform: rotate(-360deg);
        }
      }

      @keyframes breathe {
        from {
          opacity: .58;
          transform: scale(calc(.96 + (var(--loudness) * .04)));
        }
        to {
          opacity: 1;
          transform: scale(calc(1.02 + (var(--loudness) * .08)));
        }
      }

    </style>
  </defs>

  <g id="caption" class="soft">
    <path d="M111 315h16l4 6h18l5-6h30l4 6h17l5-6h39" />
    <path d="M118 326h35m15 0h25m15 0h34" />
    <path d="M99 305h18l3-4h22l4 4h12m40 0h14l4-4h25l4 4h15" />
  </g>

  <g id="circle-group">
    <g id="outer-circle">
      <path class="medium" stroke-dasharray="18 5 3 5" d="M350 180a170 170 0 1 1-340 0 170 170 0 0 1 340 0Z" />
      <path class="thin accent" stroke-dasharray="4 9" d="M338 180a158 158 0 1 1-316 0 158 158 0 0 1 316 0Z" />
      <path class="thin ghost" d="M324 180a144 144 0 1 1-288 0 144 144 0 0 1 288 0Z" />
      <g class="thin soft">
        <use href="#outer-rosette-unit" />
        <use href="#outer-rosette-unit" transform="rotate(15 180 180)" />
        <use href="#outer-rosette-unit" transform="rotate(30 180 180)" />
        <use href="#outer-rosette-unit" transform="rotate(45 180 180)" />
        <use href="#outer-rosette-unit" transform="rotate(60 180 180)" />
        <use href="#outer-rosette-unit" transform="rotate(75 180 180)" />
        <use href="#outer-rosette-unit" transform="rotate(90 180 180)" />
        <use href="#outer-rosette-unit" transform="rotate(105 180 180)" />
        <use href="#outer-rosette-unit" transform="rotate(120 180 180)" />
        <use href="#outer-rosette-unit" transform="rotate(135 180 180)" />
        <use href="#outer-rosette-unit" transform="rotate(150 180 180)" />
        <use href="#outer-rosette-unit" transform="rotate(165 180 180)" />
        <use href="#outer-rosette-unit" transform="rotate(180 180 180)" />
        <use href="#outer-rosette-unit" transform="rotate(195 180 180)" />
        <use href="#outer-rosette-unit" transform="rotate(210 180 180)" />
        <use href="#outer-rosette-unit" transform="rotate(225 180 180)" />
        <use href="#outer-rosette-unit" transform="rotate(240 180 180)" />
        <use href="#outer-rosette-unit" transform="rotate(255 180 180)" />
        <use href="#outer-rosette-unit" transform="rotate(270 180 180)" />
        <use href="#outer-rosette-unit" transform="rotate(285 180 180)" />
        <use href="#outer-rosette-unit" transform="rotate(300 180 180)" />
        <use href="#outer-rosette-unit" transform="rotate(315 180 180)" />
        <use href="#outer-rosette-unit" transform="rotate(330 180 180)" />
        <use href="#outer-rosette-unit" transform="rotate(345 180 180)" />
      </g>
      <g class="heavy">
        <line x1="340" x2="353" y1="180" y2="180" />
        <line x1="7" x2="20" y1="180" y2="180" />
        <line x1="180" x2="180" y1="7" y2="20" />
        <line x1="180" x2="180" y1="340" y2="353" />
      </g>
    </g>

    <g id="signal-crown" class="thin">
      <path d="M180 18l6 12-6 8-6-8Z" />
      <path d="M180 322l6 8-6 12-6-12Z" />
      <path d="M18 180l12-6 8 6-8 6Z" />
      <path d="M322 180l8-6 12 6-12 6Z" />
      <path class="accent" d="M289 46l1 18 17 6" />
      <path class="accent" d="M71 46l-1 18-17 6" />
      <path class="accent" d="M289 314l1-18 17-6" />
      <path class="accent" d="M71 314l-1-18-17-6" />
    </g>

    <g id="center-circle">
      <path class="thin" stroke-dasharray="28 8 5 8" d="M320 180a140 140 0 1 1-280 0 140 140 0 0 1 280 0Z" />
      <path class="thin accent" stroke-dasharray="8 11" d="M306 180a126 126 0 1 1-252 0 126 126 0 0 1 252 0Z" />
      <g class="thin soft">
        <use href="#middle-rosette-unit" />
        <use href="#middle-rosette-unit" transform="rotate(22.5 180 180)" />
        <use href="#middle-rosette-unit" transform="rotate(45 180 180)" />
        <use href="#middle-rosette-unit" transform="rotate(67.5 180 180)" />
        <use href="#middle-rosette-unit" transform="rotate(90 180 180)" />
        <use href="#middle-rosette-unit" transform="rotate(112.5 180 180)" />
        <use href="#middle-rosette-unit" transform="rotate(135 180 180)" />
        <use href="#middle-rosette-unit" transform="rotate(157.5 180 180)" />
        <use href="#middle-rosette-unit" transform="rotate(180 180 180)" />
        <use href="#middle-rosette-unit" transform="rotate(202.5 180 180)" />
        <use href="#middle-rosette-unit" transform="rotate(225 180 180)" />
        <use href="#middle-rosette-unit" transform="rotate(247.5 180 180)" />
        <use href="#middle-rosette-unit" transform="rotate(270 180 180)" />
        <use href="#middle-rosette-unit" transform="rotate(292.5 180 180)" />
        <use href="#middle-rosette-unit" transform="rotate(315 180 180)" />
        <use href="#middle-rosette-unit" transform="rotate(337.5 180 180)" />
      </g>
    </g>

    <g id="inner-circle">
      <path class="medium" stroke-dasharray="12 9" d="M290 180a110 110 0 1 1-220 0 110 110 0 0 1 220 0Z" />
      <path class="thin accent" stroke-dasharray="3 8" d="M276 180a96 96 0 1 1-192 0 96 96 0 0 1 192 0Z" />
      <g class="thin ghost">
        <use href="#inner-rosette-unit" />
        <use href="#inner-rosette-unit" transform="rotate(30 180 180)" />
        <use href="#inner-rosette-unit" transform="rotate(60 180 180)" />
        <use href="#inner-rosette-unit" transform="rotate(90 180 180)" />
        <use href="#inner-rosette-unit" transform="rotate(120 180 180)" />
        <use href="#inner-rosette-unit" transform="rotate(150 180 180)" />
        <use href="#inner-rosette-unit" transform="rotate(180 180 180)" />
        <use href="#inner-rosette-unit" transform="rotate(210 180 180)" />
        <use href="#inner-rosette-unit" transform="rotate(240 180 180)" />
        <use href="#inner-rosette-unit" transform="rotate(270 180 180)" />
        <use href="#inner-rosette-unit" transform="rotate(300 180 180)" />
        <use href="#inner-rosette-unit" transform="rotate(330 180 180)" />
      </g>
    </g>

    <g id="main-circle">
      <circle class="bevel-fill" cx="180" cy="180" r="73" />
      <path class="heavy bevel-highlight" d="M252.5 180a72.5 72.5 0 1 1-145 0 72.5 72.5 0 0 1 145 0Z" />
      <path class="heavy bevel-shadow ghost" d="M246 180a66 66 0 1 1-132 0 66 66 0 0 1 132 0Z" />
      <path class="medium" d="M238 180a58 58 0 1 1-116 0 58 58 0 0 1 116 0Z" />
      <path class="thin accent soft" d="M221 180a41 41 0 1 1-82 0 41 41 0 0 1 82 0Z" />
      <path class="thin ghost" d="M204 180a24 24 0 1 1-48 0 24 24 0 0 1 48 0Z" />
      <path class="thin bevel-highlight" d="M132 154a56 56 0 0 1 74-20" />
      <path class="thin bevel-shadow" d="M228 205a56 56 0 0 1-74 21" />
    </g>

    <g id="rotating-circles">
      <g id="bouncing-circles">
        <circle cx="180" cy="66" r="2.6" />
        <circle class="accent" cx="226.8" cy="85" r="2.2" />
        <circle cx="272.7" cy="111.7" r="2" />
        <circle class="hot" cx="283.1" cy="167.5" r="1.8" />
        <circle class="accent" cx="287.6" cy="219.9" r="2.2" />
        <circle cx="250" cy="258.9" r="2.4" />
        <circle class="accent" cx="213.4" cy="288.5" r="1.8" />
        <circle cx="148.2" cy="280.6" r="2" />
        <circle class="hot" cx="91.4" cy="252" r="1.8" />
        <circle cx="75.1" cy="192.7" r="2.2" />
        <circle class="accent" cx="77.6" cy="128.5" r="2" />
        <circle cx="124" cy="89.9" r="2.4" />
      </g>
    </g>
  </g>
</svg>
