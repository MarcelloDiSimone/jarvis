<div>
  <section class="speech-panel">
    <header class="speech-header">
      <p class="eyebrow">Speech</p>
      <h1>Wake Word Control</h1>
      <p class="copy">
        Jarvis keeps listening in the background. Say "Jarvis", wait for the
        reply, then speak your command. The text appears after you pause.
      </p>
    </header>

    <div class="controls">
      <div class="state-chip" [attr.data-state]="voiceState()">
        <span class="state-dot" aria-hidden="true"></span>
        <span class="state-label">{{ voiceStateLabel() }}</span>
      </div>

      @if (showReactivate()) {
        <button
          type="button"
          class="reactivate-button"
          (click)="onReactivateClick()"
        >
          Reactivate
        </button>
      }

      <p
        class="status"
        [class.status-live]="isRecording() && isSupported()"
        [class.status-error]="!isSupported()"
      >
        {{ statusMessage() }}
      </p>
    </div>

    <label class="transcript-field" for="speech-transcript">
      <span>Transcript</span>
      <textarea
        id="speech-transcript"
        rows="10"
        [value]="transcript()"
        (input)="onTranscriptInput($event)"
        placeholder="Recognized text will appear here"
      ></textarea>
    </label>
  </section>
</div>
